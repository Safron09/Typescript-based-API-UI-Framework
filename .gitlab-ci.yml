stages:
  - install
  - test
  - report

variables:
  BASE_URL: "https://yuriysafron.com"
  NODE_VERSION: "20"

# ------------------------------------------------------------------ #
# Install                                                              #
# ------------------------------------------------------------------ #

install:
  stage: install
  image: mcr.microsoft.com/playwright:v1.43.0-jammy
  script:
    - npm ci
    - npx playwright install --with-deps
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - node_modules/
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ------------------------------------------------------------------ #
# UI Tests                                                             #
# ------------------------------------------------------------------ #

test:ui:
  stage: test
  image: mcr.microsoft.com/playwright:v1.43.0-jammy
  needs: [install]
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - node_modules/
    policy: pull
  script:
    - npx playwright test tests/ui/ --reporter=junit,allure-playwright
  artifacts:
    when: always
    paths:
      - allure-results/
      - test-results/
    reports:
      junit: test-results/results.xml
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ------------------------------------------------------------------ #
# API Tests                                                            #
# ------------------------------------------------------------------ #

test:api:
  stage: test
  image: mcr.microsoft.com/playwright:v1.43.0-jammy
  needs: [install]
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - node_modules/
    policy: pull
  script:
    - npx playwright test tests/api/ --reporter=junit,allure-playwright
  artifacts:
    when: always
    paths:
      - allure-results/
      - test-results/
    reports:
      junit: test-results/results.xml
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ------------------------------------------------------------------ #
# E2E Tests                                                            #
# ------------------------------------------------------------------ #

test:e2e:
  stage: test
  image: mcr.microsoft.com/playwright:v1.43.0-jammy
  needs: [install]
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - node_modules/
    policy: pull
  script:
    - npx playwright test tests/e2e/ --reporter=junit,allure-playwright
  artifacts:
    when: always
    paths:
      - allure-results/
      - test-results/
      - playwright-report/
    reports:
      junit: test-results/results.xml
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ------------------------------------------------------------------ #
# Allure Report                                                        #
# ------------------------------------------------------------------ #

report:allure:
  stage: report
  image: frankescobar/allure-docker-service:latest
  needs: [test:ui, test:api, test:e2e]
  script:
    - allure generate allure-results --clean -o allure-report
  artifacts:
    when: always
    paths:
      - allure-report/
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
